<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<link rel="shortcut icon" href="setup/icon.svg" type="icon/svg" >
<link rel="stylesheet" href="style.css" />
<title>Fem-Ⓨ</title>
</head>
<body class="no-overflow-app no-scrollbar no-selection" style="filter:opacity(0);">
   <div class="container">
     <!-- SIDEBAR -->
     <div class="sidebar">
         <div class="reload-holder"><input type="button" class="reload minimal-btn" value="⏻"  title="RELOAD APP" /></div>
         <div class="controls-holder">
             <div><input type="button" class="save minimal-btn matrix -large"   value="⛾"  title="SAVE [ALL LISTS]&#10;TO LOCAL CLOUD" /></div>
             <div><input type="button" class="delete minimal-btn matrix -dark"  value="♥︎"  title="DELETE [ALL LISTS]" /></div>
             <div><input type="button" class="export minimal-btn matrix -large" value="⏍"  title="EXPORT [ALL LISTS]" /></div>

             <div><input type="file" class='' id="readFile"  hidden='true'  accept=".txt"  /></div>
         </div>
         <div class="tools-holder">
              <div><input type="button" class="view minimal-btn matrix"  value="◫◰"  title="CHANGE VIEW&#10;[LIST|GRID|TABLE]" /></div>
              <div class="marker-mode-holder"><label>m</label><input type="checkbox" class="marker-mode minimal-btn matrix" title="MARKER ON/OFF" /></div>
         </div>
         <div class="tasks-colors-holder">

         </div>
         <div class="presets-holder">

         </div>
         <div class="switches-holder">
              <div><input type="button" class="replacer-mode minimal-btn matrix"  value="R"  title="REPLACER ON/OFF" /></div>
         </div>
      </div>
   <!-- MAIN DIV  -->
     <div class="main-div">
        <ol class="main-list"></ol>
        <div class="lists-controls">
           <input type="button" class="plus-list btn" value="+" title="NEW LIST" />
           <input type="button" class="import btn" value="🌸"   title="IMPORT LIST" />
        </div>
      </div>
   <!-- SUB-DIV -->
      <div class="sub-div">
        <div class="planner-holder"></div>
        <ol class="sub-list"></ol>
           <div class="tasks-controls">
             <input type="button" class="back btn" value="<<" title="BACK" />
             <input type="button" class="plus-task btn"  value="+"  title="ADD TASK" />
           </div>
       </div>
  </div>
    <!-- REST -->
    <div class="restovi">
       <div class="noti"></div>
       <div class="replacer">
          <div class="replacer-input"><input class="r-input" type="text" placeholder="swap this" value=""/> <input class="undo-history btn" type="button" value="ⓤ" title="UNDO CHANGE" /></div>
          <div class="replacer-output"><input class="r-output" type="text" placeholder="with that" value=""/> </div>
       </div>
       <div class="sub-list-adjuster">
            <!-- <legend>Select a maintenance drone:</legend> -->
            <input type="radio" name="sub-list-pattern" value="boxes" />
            <input type="radio" name="sub-list-pattern" value="columns" checked />
            <input type="radio" name="sub-list-pattern" value="cells" />
       </div>
    </div>
<script src="presets.js"></script>
<script src="femy.js"></script>
</body>
</html>
